name: Android Internal Distribution

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: android-internal-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Analyze and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.32.6
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Unit and widget tests
        run: flutter test --no-pub

  deploy_internal:
    name: Build and Deploy (Internal)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.32.6
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Get dependencies
        run: flutter pub get

      - name: Resolve app version
        id: version
        run: |
          raw_version=$(grep -m1 '^version:' pubspec.yaml | awk '{print $2}')
          app_version="${raw_version%%+*}"
          date_prefix="$(date -u +%Y%m%d)"
          sequence=$(((GITHUB_RUN_NUMBER + GITHUB_RUN_ATTEMPT - 1) % 100))
          auto_build_number="${date_prefix}$(printf '%02d' "${sequence}")"
          echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"
          echo "build_number=${auto_build_number}" >> "$GITHUB_OUTPUT"

      - name: Restore Android upload keystore
        run: |
          echo "${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=app/upload-keystore.jks
          EOF

      - name: Build Android App Bundle
        run: >
          flutter build appbundle --release
          --build-name="${{ steps.version.outputs.app_version }}"
          --build-number="${{ steps.version.outputs.build_number }}"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 14

      - name: Upload to Google Play Internal testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: org.pyrimidines.girlsbandtabi_app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          releaseName: ${{ steps.version.outputs.app_version }} (${{ steps.version.outputs.build_number }})
